<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=website/index.html">
    <link rel="canonical" href="website/index.html">
    <title>Redirecting to JaZeR Research System...</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(6, 214, 160, 0.2);
            border-top-color: #06d6a0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            background: linear-gradient(135deg, #06d6a0, #a3ff12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: #94a3b8;
            margin: 0;
        }
        a {
            color: #06d6a0;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        a:hover {
            border-bottom-color: #06d6a0;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h1>JaZeR Strategic Research System</h1>
        <p>Redirecting to the website...</p>
        <p style="margin-top: 1rem; font-size: 0.875rem;">
            If you're not redirected, <a href="website/index.html">click here</a>
        </p>
    </div>
    <script>
        // Immediate redirect
        window.location.href = 'website/index.html';
    </script>
</body>
</html>
